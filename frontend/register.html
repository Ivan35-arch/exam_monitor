<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ExamMonitor</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h1>Create Account</h1>
            <div id="alertBox" class="alert"></div>
            <form id="registerForm">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="first_name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="last_name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Student Number (e.g. 123456/2023)</label>
                    <input type="text" id="student_no" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn">Register</button>
                <p style="margin-top:1rem; text-align:center; font-size:0.9rem; color:var(--text-muted);">
                    Already have an account? <a href="login.html" style="color:var(--primary-color);">Login</a>
                </p>
            </form>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertBox = document.getElementById('alertBox');
            alertBox.className = 'alert';
            
            const payload = {
                first_name: document.getElementById('first_name').value,
                last_name: document.getElementById('last_name').value,
                student_no: document.getElementById('student_no').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role_name: 'student'
            };

            try {
                const res = await request('/auth/register', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                setToken(res.token);
                localStorage.setItem('user', JSON.stringify(res.user));
                window.location.href = 'dashboard.html';
            } catch (err) {
                alertBox.textContent = err.error || 'Registration failed';
                alertBox.classList.add('error');
            }
        });
    </script>
</body>
</html>
