<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ExamMonitor</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <h2>Faculty Admin Portal</h2>
            <button class="btn btn-danger" style="width:auto;" onclick="clearAuth()">Logout</button>
        </nav>

        <div class="auth-card" style="max-width:600px; margin: 0 auto;">
            <h3 style="margin-bottom: 1.5rem;">Upload Official Timetable</h3>
            <div id="alertBox" class="alert"></div>
            
            <form id="uploadForm">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="title" class="form-control" placeholder="e.g. November 2025 End of Semester" required>
                </div>
                <div class="form-group" style="display:flex; gap:1rem;">
                    <div style="flex:1;">
                        <label>Semester</label>
                        <input type="text" id="semester" class="form-control" placeholder="e.g. Aug-Dec" required>
                    </div>
                    <div style="flex:1;">
                        <label>Academic Year</label>
                        <input type="text" id="academic_year" class="form-control" placeholder="e.g. 2025" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>PDF File</label>
                    <input type="file" id="timetableFile" class="form-control" accept="application/pdf" required style="padding: 0.5rem 1rem;">
                </div>
                <button type="submit" class="btn" id="uploadBtn">Upload & Parse</button>
            </form>
        </div>
        <div class="auth-card" style="max-width:800px; margin: 2rem auto;">
            <h3 style="margin-bottom: 1.5rem;">Existing Timetables</h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Semester</th>
                            <th>Year</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="timetablesBody">
                        <tr><td colspan="5" style="text-align:center;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadTimetables);

        async function loadTimetables() {
            const tbody = document.getElementById('timetablesBody');
            try {
                const timetables = await request('/timetables');
                if (timetables.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No timetables found</td></tr>';
                    return;
                }
                
                tbody.innerHTML = timetables.map(t => `
                    <tr>
                        <td>${t.title}</td>
                        <td>${t.semester}</td>
                        <td>${t.academic_year}</td>
                        <td><span class="badge ${t.status === 'published' ? 'bg-success' : 'bg-warning'}">${t.status}</span></td>
                        <td>
                            ${t.status === 'draft' ? `<button class="btn" style="padding:4px 8px; font-size:0.8rem;" onclick="publishTimetable(${t.timetable_id})">Publish</button>` : 'Published'}
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">Failed to load timetables</td></tr>';
            }
        }

        async function publishTimetable(id) {
            if (!confirm('Are you sure you want to publish this timetable? Students will be able to see it immediately.')) return;
            try {
                await request(`/timetables/${id}/publish`, { method: 'PUT' });
                alert('Timetable published successfully!');
                loadTimetables();
            } catch (err) {
                alert(err.error || 'Failed to publish');
            }
        }
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertBox = document.getElementById('alertBox');
            const btn = document.getElementById('uploadBtn');
            alertBox.className = 'alert';
            btn.textContent = 'Parsing... Please wait';
            btn.disabled = true;

            const formData = new FormData();
            formData.append('title', document.getElementById('title').value);
            formData.append('semester', document.getElementById('semester').value);
            formData.append('academic_year', document.getElementById('academic_year').value);
            formData.append('timetable', document.getElementById('timetableFile').files[0]);

            try {
                const res = await request('/timetables/upload', {
                    method: 'POST',
                    body: formData
                });
                alertBox.textContent = `Success! Parsed ${res.total_parsed} rows. Inserted ${res.total_inserted} exams.`;
                alertBox.classList.add('success');
                e.target.reset();
                loadTimetables();
            } catch (err) {
                alertBox.textContent = err.error || 'Upload failed';
                alertBox.classList.add('error');
            } finally {
                btn.textContent = 'Upload & Parse';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
