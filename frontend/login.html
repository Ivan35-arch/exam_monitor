<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ExamMonitor</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h1>ExamMonitor</h1>
            <div id="alertBox" class="alert"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn">Sign In</button>
                <p style="margin-top:1rem; text-align:center; font-size:0.9rem; color:var(--text-muted);">
                    Don't have an account? <a href="register.html" style="color:var(--primary-color);">Register</a>
                </p>
            </form>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertBox = document.getElementById('alertBox');
            alertBox.className = 'alert';
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await request('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ email, password })
                });
                setToken(res.token);
                localStorage.setItem('user', JSON.stringify(res.user));
                
                if (res.user.role_name === 'student') window.location.href = 'dashboard.html';
                else window.location.href = 'admin.html';
            } catch (err) {
                alertBox.textContent = err.error || 'Login failed';
                alertBox.classList.add('error');
            }
        });
    </script>
</body>
</html>
